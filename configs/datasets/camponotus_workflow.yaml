# Camponotus dataset workflow defaults (data-prep only; no training).

paths:
  raw_root: datasets/camponotus_raw
  in_situ_root: datasets/camponotus_raw/in_situ
  external_images_dir: datasets/camponotus_raw/external/images
  processed_root: datasets/camponotus_processed
  cvat_coco_annotations: datasets/camponotus_processed/annotations/cvat_coco/cvat_camponotus_all.json
  split_manifest: datasets/camponotus_processed/splits.json
  analysis_json: datasets/camponotus_processed/analysis.json
  yolo_root: datasets/camponotus_yolo
  coco_root: datasets/camponotus_coco
  # Roboflow-style train/valid for RF-DETR (from prepare_camponotus_coco_rfdetr.py)
  rfdetr_coco_root: datasets/camponotus_rfdetr_coco

classes:
  - ant
  - trophallaxis

split:
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  seed: 42

frame_extraction:
  fps: 5.0
  # Optional: higher FPS for clips whose filename contains "trophallaxis"
  # (CLI: --fps 5 --fps-trophallaxis 8)
  fps_trophallaxis:
  image_ext: .jpg
  seq_prefix: seq_
  # Folder names: seq_<sanitized_video_stem> (default CLI --seq-naming video)
  seq_naming: video

bootstrap:
  backend: auto
  conf: 0.25
  max_images:
